<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d0a05">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Studio Verónica Capurro</title>
  <style>
    :root {
      --bg-dark: #0d0a05;
      --bg-card: #1a1208;
      --bg-card2: #f5efe0;
      --gold: #c8962a;
      --gold-light: #e8b84b;
      --gold-btn: #c8962a;
      --red-btn: #b82020;
      --dark-btn: #2a2010;
      --text-dark: #1a1208;
      --text-light: #f5efe0;
      --text-muted: #8a7050;
      --border-gold: #c8962a44;
      --tag-bg: #ffe4c4;
      --tag-text: #b85000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-dark);
      color: var(--text-light);
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      background: var(--bg-dark);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border-gold);
    }
    .header-logo {
      width: 52px; height: 52px;
      background: #fff;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: bold; color: #1a1208;
      flex-shrink: 0;
      overflow: hidden;
    }
    .header-logo img { width: 100%; height: 100%; object-fit: contain; }
    .header-text { flex: 1; }
    .header-text .studio-label {
      font-size: 9px; letter-spacing: 3px; color: var(--gold);
      text-transform: uppercase; font-family: sans-serif;
    }
    .header-text h1 {
      font-size: 22px; color: var(--gold); font-style: italic;
      line-height: 1.1; letter-spacing: 0.5px;
    }

    /* ── SECTION HEADER ── */
    .section-header {
      background: #1a1208;
      margin: 12px;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--border-gold);
    }
    .section-title {
      font-size: 26px; color: var(--gold); font-style: italic;
      line-height: 1.1; border-left: 3px solid var(--gold); padding-left: 10px;
    }
    .header-buttons {
      display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
    }
    .btn-nuevo {
      background: var(--gold-btn);
      color: var(--bg-dark);
      border: none; border-radius: 22px;
      padding: 10px 18px;
      font-size: 14px; font-weight: bold; font-family: sans-serif;
      cursor: pointer; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.15s;
    }
    .btn-nuevo:hover { background: var(--gold-light); }

    /* ── IMPORT JSON BUTTON ── */
    .btn-import {
      background: #1e5c1e;
      color: #a8ffa8;
      border: 1.5px solid #3a9a3a;
      border-radius: 22px;
      padding: 8px 16px;
      font-size: 12px; font-weight: bold; font-family: sans-serif;
      cursor: pointer; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.15s;
    }
    .btn-import:hover { background: #256b25; }
    .btn-import svg { flex-shrink: 0; }
    #json-file-input { display: none; }

    /* ── SEARCH + SORT ── */
    .search-sort { padding: 0 12px 8px; }
    .search-box {
      background: #f5efe0;
      border-radius: 12px;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      margin-bottom: 10px;
    }
    .search-box input {
      border: none; background: transparent;
      font-size: 14px; color: #555; flex: 1; outline: none;
      font-family: sans-serif;
    }
    .search-box input::placeholder { color: #aaa; }
    .sort-row {
      display: flex; align-items: center; gap: 8px;
    }
    .sort-label { font-size: 11px; letter-spacing: 1px; color: var(--text-muted); font-family: sans-serif; text-transform: uppercase; }
    .btn-sort {
      border-radius: 20px; padding: 7px 18px;
      font-size: 13px; font-weight: bold; font-family: sans-serif;
      cursor: pointer; border: none;
    }
    .btn-sort.active { background: var(--gold-btn); color: var(--bg-dark); }
    .btn-sort.inactive { background: #2a2010; color: #888; }

    /* ── CLIENT LIST ── */
    .client-list { padding: 0 12px; flex: 1; overflow-y: auto; padding-bottom: 80px; }
    .client-card {
      background: var(--bg-card2);
      border-radius: 14px;
      padding: 14px 14px;
      margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px;
      border: 1px solid #e8d8b8;
    }
    .client-info { flex: 1; min-width: 0; }
    .client-name {
      font-size: 18px; color: var(--text-dark); font-weight: bold;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .client-meta {
      display: flex; align-items: center; gap: 8px; margin-top: 4px;
      flex-wrap: wrap;
    }
    .client-visits { font-size: 12px; color: #888; font-family: sans-serif; }
    .client-service { font-size: 12px; color: #888; font-family: sans-serif; }
    .client-tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 12px; font-weight: bold; font-family: sans-serif;
    }
    .client-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .btn-visita {
      background: var(--gold-btn); color: var(--bg-dark);
      border: none; border-radius: 10px;
      padding: 9px 14px; font-size: 13px; font-weight: bold; font-family: sans-serif;
      cursor: pointer; white-space: nowrap;
      display: flex; align-items: center; gap: 4px;
    }
    .btn-visita:hover { background: var(--gold-light); }
    .btn-icon {
      border: none; border-radius: 10px;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; color: #fff;
    }
    .btn-edit { background: var(--dark-btn); }
    .btn-edit:hover { background: #3a3020; }
    .btn-del  { background: var(--red-btn); }
    .btn-del:hover  { background: #e03030; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: #0d0a05;
      border-top: 1px solid var(--border-gold);
      display: flex;
      z-index: 100;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8px 4px;
      font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
      font-family: sans-serif; color: #666; cursor: pointer;
      gap: 4px; border: none; background: transparent;
    }
    .nav-item.active { color: var(--gold); }
    .nav-icon { font-size: 20px; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1208;
      border: 1px solid var(--border-gold);
      border-radius: 16px;
      padding: 24px;
      width: calc(100% - 32px);
      max-width: 400px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h2 { color: var(--gold); font-size: 20px; margin-bottom: 16px; }
    .modal label { display: block; color: #ccc; font-size: 13px; margin-bottom: 4px; font-family: sans-serif; }
    .modal input, .modal select {
      width: 100%; padding: 10px 12px;
      background: #0d0a05; border: 1px solid var(--border-gold);
      border-radius: 8px; color: #fff; font-size: 14px; font-family: sans-serif;
      margin-bottom: 12px; outline: none;
    }
    .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
    .btn-save {
      flex: 1; background: var(--gold-btn); color: var(--bg-dark);
      border: none; border-radius: 10px; padding: 11px;
      font-size: 15px; font-weight: bold; font-family: sans-serif; cursor: pointer;
    }
    .btn-cancel {
      flex: 1; background: #2a2010; color: #ccc;
      border: none; border-radius: 10px; padding: 11px;
      font-size: 15px; font-family: sans-serif; cursor: pointer;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #1e5c1e; color: #a8ffa8;
      padding: 10px 22px; border-radius: 20px;
      font-size: 14px; font-family: sans-serif;
      z-index: 300; display: none; white-space: nowrap;
      border: 1px solid #3a9a3a;
    }
    .toast.error { background: #5c1e1e; color: #ffa8a8; border-color: #9a3a3a; }
    .toast.show { display: block; animation: fadeInOut 3s forwards; }
    @keyframes fadeInOut {
      0%   { opacity: 0; }
      15%  { opacity: 1; }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center; color: var(--text-muted);
      padding: 40px 20px; font-family: sans-serif;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
    <svg viewBox="0 0 60 60" width="52" height="52" xmlns="http://www.w3.org/2000/svg">
      <rect width="60" height="60" fill="#fff"/>
      <text x="30" y="38" text-anchor="middle" font-size="28" font-family="Georgia" font-weight="bold" fill="#1a1208">VC</text>
      <text x="30" y="50" text-anchor="middle" font-size="8" font-family="sans-serif" fill="#c8962a">Studio</text>
    </svg>
  </div>
  <div class="header-text">
    <div class="studio-label">Studio</div>
    <h1>Verónica Capurro</h1>
  </div>
</div>

<!-- SECTION HEADER with buttons -->
<div class="section-header">
  <div class="section-title">Ficha de<br>Cliente</div>
  <div class="header-buttons">
    <button class="btn-nuevo" onclick="openModal()">
      <span>+</span> Nuevo Cliente
    </button>
    <button class="btn-import" onclick="document.getElementById('json-file-input').click()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Importar JSON
    </button>
    <input type="file" id="json-file-input" accept=".json" onchange="importJSON(event)">
  </div>
</div>

<!-- SEARCH + SORT -->
<div class="search-sort">
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search-input" placeholder="Buscar cliente por nombre, teléfono..." oninput="renderClients()">
  </div>
  <div class="sort-row">
    <span class="sort-label">Ordenar:</span>
    <button class="btn-sort active" id="sort-name" onclick="setSort('nombre')">Nombre</button>
    <button class="btn-sort inactive" id="sort-visit" onclick="setSort('visita')">Última visita</button>
  </div>
</div>

<!-- CLIENT LIST -->
<div class="client-list" id="client-list"></div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active">
    <span class="nav-icon">👤</span>
    <span>Clientes</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">✂️</span>
    <span>Servicios</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">📦</span>
    <span>Productos</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">📅</span>
    <span>Agenda</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">📋</span>
    <span>Historial</span>
  </button>
  <button class="nav-item">
    <span class="nav-icon">📊</span>
    <span>Estadísticas</span>
  </button>
</nav>

<!-- MODAL: NUEVO / EDITAR CLIENTE -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Nuevo Cliente</h2>
    <label>Nombre</label>
    <input type="text" id="f-nombre" placeholder="Ej: Ana María">
    <label>Teléfono</label>
    <input type="text" id="f-telefono" placeholder="Ej: 099 123 456">
    <label>Servicio</label>
    <input type="text" id="f-servicio" placeholder="Ej: Coloración">
    <label>Última visita</label>
    <input type="date" id="f-visita">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveClient()">Guardar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
let clients = JSON.parse(localStorage.getItem('vc_clients') || '[]');

// Demo data if empty
if (clients.length === 0) {
  clients = [
    { id: 1, nombre: 'A. María',             telefono: '', servicio: 'Coloración', visita: '2024-06-01', visitas: 1 },
    { id: 2, nombre: 'Adriana (Veterinaria)', telefono: '', servicio: 'Coloración', visita: '2024-06-02', visitas: 1 },
    { id: 3, nombre: 'Alba (Marieta)',        telefono: '', servicio: 'Coloración', visita: '2024-06-03', visitas: 1 },
    { id: 4, nombre: 'Alicia (zapatillas)',   telefono: '', servicio: 'Coloración', visita: '2024-06-04', visitas: 1 },
    { id: 5, nombre: 'Ana María (Fotógrafa)', telefono: '', servicio: 'Coloración', visita: '2024-06-05', visitas: 3 },
  ];
  saveData();
}

let sortMode = 'nombre';
let editingId = null;

function saveData() {
  localStorage.setItem('vc_clients', JSON.stringify(clients));
}

// ── SORT ──────────────────────────────────────────────────────────────
function setSort(mode) {
  sortMode = mode;
  document.getElementById('sort-name').className  = 'btn-sort ' + (mode === 'nombre' ? 'active' : 'inactive');
  document.getElementById('sort-visit').className = 'btn-sort ' + (mode === 'visita' ? 'active' : 'inactive');
  renderClients();
}

// ── RENDER ────────────────────────────────────────────────────────────
function timeAgo(dateStr) {
  if (!dateStr) return '';
  const now = new Date();
  const then = new Date(dateStr);
  const days = Math.floor((now - then) / 86400000);
  if (days < 30)  return days + ' días';
  if (days < 365) return Math.floor(days/30) + ' mes' + (Math.floor(days/30) > 1 ? 'es' : '');
  const yrs = Math.floor(days/365);
  return yrs + ' año' + (yrs > 1 ? 's' : '');
}

function renderClients() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  let list = clients.filter(c =>
    c.nombre.toLowerCase().includes(q) ||
    (c.telefono || '').toLowerCase().includes(q)
  );
  if (sortMode === 'nombre') {
    list.sort((a,b) => a.nombre.localeCompare(b.nombre, 'es'));
  } else {
    list.sort((a,b) => new Date(b.visita || 0) - new Date(a.visita || 0));
  }

  const container = document.getElementById('client-list');
  if (list.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">👤</div><p>No se encontraron clientes</p></div>`;
    return;
  }
  container.innerHTML = list.map(c => `
    <div class="client-card">
      <div class="client-info">
        <div class="client-name">${escHtml(c.nombre)}</div>
        <div class="client-meta">
          <span class="client-visits">${c.visitas || 1} visita${(c.visitas||1)>1?'s':''}</span>
          <span class="client-service">· ${escHtml(c.servicio || '')}</span>
          ${c.visita ? `<span class="client-tag">${timeAgo(c.visita)}</span>` : ''}
        </div>
      </div>
      <div class="client-actions">
        <button class="btn-visita" onclick="addVisit(${c.id})">+ Visita</button>
        <button class="btn-icon btn-edit" onclick="openModal(${c.id})" title="Editar">✏️</button>
        <button class="btn-icon btn-del"  onclick="deleteClient(${c.id})" title="Eliminar">🗑️</button>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── MODAL ─────────────────────────────────────────────────────────────
function openModal(id = null) {
  editingId = id;
  document.getElementById('modal-title').textContent = id ? 'Editar Cliente' : 'Nuevo Cliente';
  if (id) {
    const c = clients.find(x => x.id === id);
    document.getElementById('f-nombre').value   = c.nombre || '';
    document.getElementById('f-telefono').value = c.telefono || '';
    document.getElementById('f-servicio').value = c.servicio || '';
    document.getElementById('f-visita').value   = c.visita || '';
  } else {
    document.getElementById('f-nombre').value   = '';
    document.getElementById('f-telefono').value = '';
    document.getElementById('f-servicio').value = '';
    document.getElementById('f-visita').value   = new Date().toISOString().split('T')[0];
  }
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}

function saveClient() {
  const nombre = document.getElementById('f-nombre').value.trim();
  if (!nombre) { showToast('El nombre es obligatorio', true); return; }
  if (editingId) {
    const i = clients.findIndex(x => x.id === editingId);
    clients[i].nombre   = nombre;
    clients[i].telefono = document.getElementById('f-telefono').value.trim();
    clients[i].servicio = document.getElementById('f-servicio').value.trim();
    clients[i].visita   = document.getElementById('f-visita').value;
  } else {
    clients.push({
      id: Date.now(),
      nombre,
      telefono: document.getElementById('f-telefono').value.trim(),
      servicio: document.getElementById('f-servicio').value.trim(),
      visita:   document.getElementById('f-visita').value,
      visitas:  1
    });
  }
  saveData(); closeModal(); renderClients();
  showToast(editingId ? 'Cliente actualizado ✓' : 'Cliente agregado ✓');
}

function addVisit(id) {
  const c = clients.find(x => x.id === id);
  c.visitas = (c.visitas || 1) + 1;
  c.visita = new Date().toISOString().split('T')[0];
  saveData(); renderClients();
  showToast('Visita registrada para ' + c.nombre + ' ✓');
}

function deleteClient(id) {
  if (!confirm('¿Eliminar este cliente?')) return;
  clients = clients.filter(x => x.id !== id);
  saveData(); renderClients();
  showToast('Cliente eliminado');
}

// ── IMPORT JSON ───────────────────────────────────────────────────────
function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      let data = JSON.parse(e.target.result);
      // Accept array directly or object with a 'clientes' / 'clients' key
      if (!Array.isArray(data)) {
        data = data.clientes || data.clients || data.data || [];
      }
      if (!Array.isArray(data) || data.length === 0) {
        showToast('JSON inválido o sin datos', true); return;
      }
      let imported = 0;
      data.forEach(item => {
        const nombre = item.nombre || item.name || item.Name || '';
        if (!nombre) return;
        // Avoid duplicates by name
        const exists = clients.some(c => c.nombre.toLowerCase() === nombre.toLowerCase());
        if (!exists) {
          clients.push({
            id: Date.now() + Math.random(),
            nombre,
            telefono: item.telefono || item.phone || item.tel || '',
            servicio: item.servicio || item.service || '',
            visita:   item.visita || item.lastVisit || new Date().toISOString().split('T')[0],
            visitas:  item.visitas || item.visits || 1
          });
          imported++;
        }
      });
      saveData(); renderClients();
      showToast(`✓ ${imported} cliente${imported !== 1 ? 's' : ''} importado${imported !== 1 ? 's' : ''}`);
    } catch (err) {
      showToast('Error al leer el archivo JSON', true);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ── TOAST ─────────────────────────────────────────────────────────────
function showToast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (error ? ' error' : '') + ' show';
  setTimeout(() => t.className = 'toast', 3200);
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Init
renderClients();
</script>
</body>
</html>
